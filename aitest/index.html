<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>石のご相談窓口（試験）</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  margin: 0;
  background: #f5f5f5;
}

/* ===== 右下固定ボタン ===== */
.chat-button {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #333;
  color: #fff;
  padding: 14px 18px;
  border-radius: 30px;
  cursor: pointer;
  font-size: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  z-index: 999;
}

/* ===== モーダル背景 ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  z-index: 998;
}

/* ===== モーダル本体 ===== */
.modal {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 80vh;
  background: #fff;
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
  display: none;
  flex-direction: column;
  z-index: 999;
}

.modal-header {
  padding: 16px;
  border-bottom: 1px solid #eee;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.close-btn {
  cursor: pointer;
  font-size: 20px;
}

/* ===== チャット表示エリア ===== */
.chat-body {
  flex: 1;
  padding: 16px;
  overflow-y: auto;
  background: #fafafa;
}

.message {
  margin-bottom: 12px;
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
}

.user {
  background: #dceeff;
  margin-left: auto;
}

.ai {
  background: #fff;
  border: 1px solid #eee;
}

/* ===== 入力欄 ===== */
.chat-input {
  display: flex;
  border-top: 1px solid #eee;
  padding: 10px;
  background: #fff;
}

.chat-input input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 16px;
}

.chat-input button {
  margin-left: 8px;
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  background: #333;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h1 style="padding:40px 20px;">石のご相談窓口（デモ）</h1>
<p style="padding:0 20px 100px;">
このページはAIチャットの試験表示用です。<br>
右下のボタンからご相談画面を開けます。
</p>

<!-- ===== 固定ボタン ===== -->
<div class="chat-button" onclick="openChat()">
  🗨 石のご相談
</div>

<!-- ===== 背景 ===== -->
<div class="modal-overlay" onclick="closeChat()"></div>

<!-- ===== モーダル ===== -->
<div class="modal">
  <div class="modal-header">
    石のご相談窓口
    <span class="close-btn" onclick="closeChat()">×</span>
  </div>

  <div class="chat-body" id="chatBody">
    <div class="message ai">
      石に関するご相談をお受けしています。<br>
      まだ決めていない段階でも大丈夫です。
    </div>
  </div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="メッセージを入力…" />
    <button onclick="sendMessage()">送信</button>
  </div>
</div>

<script>
function openChat() {
  document.querySelector(".modal").style.display = "flex";
  document.querySelector(".modal-overlay").style.display = "block";
}

function closeChat() {
  document.querySelector(".modal").style.display = "none";
  document.querySelector(".modal-overlay").style.display = "none";
}

async function sendMessage() {
  const input = document.getElementById("userInput");
  const chatBody = document.getElementById("chatBody");

  if (!input.value.trim()) return;

  const userText = input.value;

  const userMsg = document.createElement("div");
  userMsg.className = "message user";
  userMsg.innerText = userText;
  chatBody.appendChild(userMsg);

  input.value = "";

  const aiMsg = document.createElement("div");
  aiMsg.className = "message ai";
  aiMsg.innerText = "少々お待ちください…";
  chatBody.appendChild(aiMsg);

  chatBody.scrollTop = chatBody.scrollHeight;

  const response = await fetch("https://aitest.trc-wasps.workers.dev", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: userText })
  });

  const data = await response.json();

  aiMsg.innerText = data.reply;

  chatBody.scrollTop = chatBody.scrollHeight;
}
</script>

</body>
</html>
