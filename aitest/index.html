<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>お墓のご相談窓口（試験）</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  margin: 0;
  background: #f5f5f5;
}

/* ===== 右下固定ボタン ===== */
.chat-button {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #333;
  color: #fff;
  padding: 14px 18px;
  border-radius: 30px;
  cursor: pointer;
  font-size: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  z-index: 999;
}

/* ===== モーダル背景 ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  z-index: 998;
}

/* ===== モーダル本体 ===== */
.modal {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 80vh;
  background: #fff;
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
  display: none;
  flex-direction: column;
  z-index: 999;
}

.modal-header {
  padding: 16px;
  border-bottom: 1px solid #eee;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.close-btn {
  cursor: pointer;
  font-size: 20px;
}

/* ===== チャット表示エリア ===== */
.chat-body {
  flex: 1;
  padding: 16px;
  overflow-y: auto;
  background: transparent;
}

.message {
  margin-bottom: 12px;
  max-width: 75%;
  padding: 10px 12px;
  border-radius: 12px;
  font-size: 14px;
}

.user {
  background: #dceeff;
  margin-left: auto;
}

.ai {
  background: transparent;
}

/* ===== 入力欄 ===== */
.chat-input {
  display: flex;
  border-top: 1px solid #eee;
  padding: 10px 10px 15px 10px;
  background: #fff;
}

.chat-input input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 16px;
}

.chat-input button {
  margin-left: 8px;
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  background: #333;
  color: white;
  cursor: pointer;
}
  .modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  object-fit: cover;
}
  .ai-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.ai-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  object-fit: cover;
  margin-top: 4px;
}

.bubble {
  background: #f0f2f5;
  padding: 10px 14px;
  border-radius: 14px;
  max-width: 85%;
  font-size: 14px;
}
</style>
</head>

<body>

<h1 style="padding:40px 20px;">お墓のご相談窓口（デモ）</h1>
<p style="padding:0 20px 100px;">
このページはAIチャットの試験表示用です。<br>
右下のボタンからご相談画面を開けます。
</p>

<!-- ===== 固定ボタン ===== -->
<div class="chat-button" onclick="openChat()">
  🗨 AI相談窓口
</div>

<!-- ===== 背景 ===== -->
<div class="modal-overlay" onclick="closeChat()"></div>

<!-- ===== モーダル ===== -->
<div class="modal">

  <!-- ヘッダー -->
  <div class="modal-header">
    <div class="header-left">
      <img src="https://github.ojach.com/icon/ai-icon.png" class="header-icon">
      お墓のご相談窓口
    </div>
    <span class="close-btn" onclick="closeChat()">×</span>
  </div>

  <!-- チャット本体 -->
  <div class="chat-body" id="chatBody">
    <div class="message ai">
      <div class="ai-row">
        <img src="https://github.ojach.com/icon/ai-icon.png" class="ai-avatar">
        <div class="bubble">
          お墓に関するご相談をお受けしています。<br>
          今のお悩みに近いものを教えてください。<br><br>
           ・新しく建てるか悩んでいる<br>
           ・今あるお墓のことで悩んでいる<br>
           ・費用や相場を知りたい<br>
           ・宇山石材の特徴 など
          
        </div>
      </div>
    </div>
  </div>

  <!-- 入力欄 -->
  <div class="chat-input">
    <input type="text" id="userInput" placeholder="メッセージを入力…" />
    <button onclick="sendMessage()">送信</button>
  </div>

</div>

<script>
  let chatHistory = [];
  let turnCount = 0;
function openChat() {
  document.querySelector(".modal").style.display = "flex";
  document.querySelector(".modal-overlay").style.display = "block";
}

function closeChat() {
  document.querySelector(".modal").style.display = "none";
  document.querySelector(".modal-overlay").style.display = "none";
}

async function sendMessage() {
  const input = document.getElementById("userInput");
  const chatBody = document.getElementById("chatBody");

  if (!input.value.trim()) return;

  const userText = input.value;

  // 画面にユーザー表示
  const userMsg = document.createElement("div");
  userMsg.className = "message user";
  userMsg.innerText = userText;
  chatBody.appendChild(userMsg);

  // ★ 履歴に追加
  chatHistory.push({
    role: "user",
    content: userText
  });
// 履歴を最新5件に制限
chatHistory = chatHistory.slice(-8);
  input.value = "";

  // 仮のAI表示
  const aiMsg = document.createElement("div");
  aiMsg.className = "message ai";
  aiMsg.innerHTML = `
    <div class="ai-row">
      <img src="https://github.ojach.com/icon/ai-icon.png" class="ai-avatar">
      <div class="bubble">少々お待ちください…</div>
    </div>
  `;
  chatBody.appendChild(aiMsg);

  chatBody.scrollTop = chatBody.scrollHeight;

  // ★ 履歴ごと送る
 const response = await fetch("https://aitest.trc-wasps.workers.dev", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    history: chatHistory,
    stage: turnCount >= 4 ? "final" : "normal"
  })
});

  const data = await response.json();

  let text = data.reply;

  // 軽い整形
  text = text.replace(/。/g, "。\n");
  text = text.replace(/\n\n+/g, "\n\n");

  const formatted = text.replace(/\n/g, "<br>");

  aiMsg.innerHTML = `
    <div class="ai-row">
      <img src="https://github.ojach.com/icon/ai-icon.png" class="ai-avatar">
      <div class="bubble">${formatted}</div>
    </div>
  `;

  // ★ AI返答も履歴に追加
  chatHistory.push({
    role: "assistant",
    content: data.reply
  });

  chatBody.scrollTop = chatBody.scrollHeight;
  turnCount++;
}
</script>

</body>
</html>
